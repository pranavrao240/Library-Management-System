                    <div class="container-fluid px-4">
                        
                        <div class="card mb-4">

                       			Fill the Below Library Registeration Form Carefully..!
                                
                            </div>

                        </div>
                        <div>
							<h1 id="heading">Book Issue</h1>
						  <form id="form" action="libBook" method="post">
							  
						    <label >Enter Your Library No.</label>
						    <input type="text" id="myinput" name="lno" placeholder="Enter Library No..">
						    <label >Enter Book Title</label>
						    <input type="text" id="myinput" name="btitle" placeholder=" Book Title..">
						
						    <label >Book Code</label>
						    <input type="text" id="myinput" name="bcode" placeholder="Book Code..">
						    
						    <label >Book Issue Date</label>
						    <input type="date" id="myinput"  name="IssueDate">
						    
						
						    <input type="submit" value="Submit">
						  </form>
						</div>

        <script>
			const form = document.querySelector('#form');
			form.addEventListener('submit',function(event){
				event.preventDefault();
				
				const input = document.querySelector('#myinput').value;
				if(input.trim() == null){
					alert("Please enter some data");
				}
				else{
					alert("Book Issued Successfully..!");
					form.submit();
					
				}
				
			});
			
			
			
				
			
		</script>
